services:
  waha:
    image: devlikeapro/waha:gows-2026.6.1
    container_name: waha
    restart: unless-stopped
    ports:
      - "12052:3000"
    environment:
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WAHA_DASHBOARD_ENABLED=true
      - WAHA_DASHBOARD_USERNAME=wahaadmin
      - WAHA_DASHBOARD_PASSWORD=${WAHA_PASSWORD}
      - WHATSAPP_SWAGGER_USERNAME=wahaadmin
      - WHATSAPP_SWAGGER_PASSWORD=${WAHA_PASSWORD}
    volumes:
      - ./sessions:/app/.sessions
      - ./media:/app/.media

  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

  climate-alert-consumer:
    depends_on:
      - kafka
    image: climate-alert-consumer:latest
    container_name: climate-alert-consumer
    restart: unless-stopped
    volumes:
      - consumer_db:/db
    environment:
      - BROKER_ADDRESS=kafka:9092
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WAHA_PASSWORD=${WAHA_PASSWORD}
      - WAHA_URL=http://waha:3000

  climate-alert-producer:
    depends_on:
      - climate-alert-consumer
    image: climate-alert-producer:latest
    container_name: climate-alert-producer
    restart: unless-stopped
    environment:
      - GOOGLE_CLIMATE_API_KEY=${GOOGLE_CLIMATE_API_KEY}
      - BROKER_ADDRESS=kafka:9092

volumes:
  consumer_db:
  kafka_data:
