# ============================================================
# NÃO APLIQUE ESTE ARQUIVO DIRETAMENTE.
# Crie o secret via kubectl com o comando abaixo, substituindo
# pelo caminho do seu JSON de service account do GCR/Artifact Registry:
#
#   kubectl create secret docker-registry gcr-credentials \
#     --docker-server=gcr.io \
#     --docker-username=_json_key \
#     --docker-password="$(cat /caminho/para/sua-service-account.json)" \
#     --docker-email=seu-email@projeto.iam.gserviceaccount.com \
#     --namespace=climate-alert
#
# Se estiver usando o Artifact Registry (us-docker.pkg.dev etc), 
# troque o --docker-server pelo host correto.
# ============================================================

# Variaveis de ambiente sensíveis (API keys, senhas etc) devem ser armazenadas em Secrets do Kubernetes.

# kubectl create secret generic climate-alert-secrets \
#   --namespace=climate-alert \
#   --from-literal=WAHA_API_KEY=$WAHA_API_KEY \
#   --from-literal=WAHA_PASSWORD=$WAHA_PASSWORD \
#   --from-literal=GOOGLE_CLIMATE_API_KEY=$GOOGLE_CLIMATE_API_KEY